<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Emporium — Account</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
  
  .header{background:#1a1a1a;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .header-logo{display:flex;align-items:center;gap:10px}
  .header-logo svg{width:24px;height:24px}
  .header-name{font-size:15px;font-weight:600;color:#fff}
  .header-sub{font-size:11px;color:#888;margin-top:1px}
  .header-right{font-size:11px;color:#666;text-align:right}

  .container{max-width:600px;margin:0 auto;padding:20px 16px 60px}

  .party-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #eee}
  .party-name{font-size:20px;font-weight:600;margin-bottom:4px}
  .party-date{font-size:12px;color:#888;margin-bottom:16px}
  .balance-row{display:flex;align-items:flex-end;gap:8px}
  .balance-label{font-size:12px;color:#888;margin-bottom:4px}
  .balance-amt{font-size:32px;font-weight:700;line-height:1}
  .balance-amt.dr{color:#e24b4a}
  .balance-amt.cr{color:#1d9e75}
  .balance-side{font-size:14px;font-weight:500;margin-bottom:5px}
  .balance-side.dr{color:#e24b4a}
  .balance-side.cr{color:#1d9e75}

  .action-row{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
  .btn-primary{background:#1a1a1a;color:#fff}
  .btn-wa{background:#25D366;color:#fff}
  .btn-secondary{background:#f0f0eb;color:#1a1a1a}

  .section{margin-bottom:16px}
  .section-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding:0 4px}

  .txn-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee}
  .txn-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f0}
  .txn-row:last-child{border-bottom:none}
  .txn-row.opening{background:#f9f9f7}
  .txn-row.closing{background:#f9f9f7;font-weight:600}
  .txn-left{flex:1}
  .txn-date{font-size:12px;color:#888;margin-bottom:2px}
  .txn-type{font-size:14px;font-weight:500}
  .txn-type.sales{color:#1a1a1a}
  .txn-type.receipt{color:#1d9e75}
  .txn-type.purchase{color:#888}
  .txn-type.opening{color:#888}
  .txn-acc{font-size:11px;color:#aaa;margin-top:1px}
  .txn-right{text-align:right}
  .txn-amt{font-size:14px;font-weight:500}
  .txn-amt.dr{color:#e24b4a}
  .txn-amt.cr{color:#1d9e75}
  .txn-bal{font-size:11px;color:#aaa;margin-top:2px}

  .bills-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee}
  .bill-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f0;cursor:pointer}
  .bill-row:last-child{border-bottom:none}
  .bill-row:active{background:#f9f9f7}
  .bill-left{flex:1}
  .bill-ref{font-size:14px;font-weight:500}
  .bill-date{font-size:12px;color:#888;margin-top:1px}
  .bill-right{text-align:right}
  .bill-amt{font-size:14px;font-weight:500;color:#e24b4a}
  .bill-days{font-size:11px;margin-top:2px;padding:2px 8px;border-radius:20px;display:inline-block}
  .bill-days.critical{background:#fef2f2;color:#e24b4a}
  .bill-days.overdue{background:#fffbeb;color:#b45309}
  .bill-days.fresh{background:#f0fdf4;color:#15803d}
  .bill-arrow{color:#ccc;font-size:18px;margin-left:8px}

  .empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
  
  .loading{text-align:center;padding:60px 20px}
  .loading-spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:14px;color:#888}

  .error-box{background:#fff;border-radius:16px;padding:32px 20px;text-align:center;border:1px solid #eee}
  .error-icon{font-size:40px;margin-bottom:12px}
  .error-title{font-size:16px;font-weight:600;margin-bottom:8px}
  .error-msg{font-size:14px;color:#888}

  .footer{text-align:center;padding:20px;font-size:12px;color:#aaa}
  .footer strong{color:#888}

  .tabs{display:flex;background:#fff;border-radius:12px;padding:4px;gap:4px;margin-bottom:16px;border:1px solid #eee}
  .tab{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:none;border-radius:8px;cursor:pointer;color:#888}
  .tab.active{background:#1a1a1a;color:#fff}

  .note-box{background:#fff8e1;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:16px;border:1px solid #fde68a}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
    <div>
      <div class="header-name">Electric Emporium</div>
      <div class="header-sub">Gujri Chowk, Balaghat</div>
    </div>
  </div>
  <div class="header-right">
    <div>+91 94258 31035</div>
  </div>
</div>

<div class="container">
  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading your account...</div>
    </div>
  </div>
</div>

<div class="footer">
  <strong>Electric Emporium</strong> · Gujri Chowk, Balaghat · +91 94258 31035
</div>

<script>
const SB_URL = 'https://dnmzzckeuctnkqbphwdg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRubXp6Y2tldWN0bmtxYnBod2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjYxMTMsImV4cCI6MjA5NjY0MjExM30.3MzHpkiISPhJCOCA02jy295m_a2CLbV0MHn0TMCDFGc';

const SB_HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY
};

function fmt(n){ return '₹' + Math.abs(Math.round(n)).toLocaleString('en-IN'); }
function fmtDate(d){ 
  if(!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = d.split('-');
  if(parts.length === 3){
    return parts[0] + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[2];
  }
  return d;
}

async function sbGet(path){
  const r = await fetch(SB_URL + '/rest/v1/' + path, { headers: SB_HEADERS });
  return r.json();
}

async function sbRpc(fn, body){
  const r = await fetch(SB_URL + '/rest/v1/rpc/' + fn, {
    method: 'POST',
    headers: { ...SB_HEADERS, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

function getToken(){
  // Read token from hash (e.g., #token=abc123 or just #abc123)
  const hash = window.location.hash.substring(1);
  if(!hash) return null;
  
  // If hash contains query params like token=abc
  const params = new URLSearchParams(hash);
  const paramToken = params.get('token') || params.get('t');
  
  // Return param token if found, otherwise return the hash itself as token
  return paramToken || hash;
}

function showError(title, msg){
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <div class="error-icon">⚡</div>
      <div class="error-title">${title}</div>
      <div class="error-msg">${msg}</div>
    </div>`;
}

function ageDays(billDate){
  if(!billDate) return 0;
  const today = new Date();
  const parts = billDate.split('-');
  let d;
  if(parts.length === 3 && parts[1].length <= 2){
    d = new Date(parts[2], parseInt(parts[1])-1, parseInt(parts[0]));
  } else {
    d = new Date(billDate);
  }
  return Math.floor((today - d) / 86400000);
}

function daysBadge(days){
  if(days > 90) return `<span class="bill-days critical">${days}d overdue</span>`;
  if(days > 30) return `<span class="bill-days overdue">${days}d overdue</span>`;
  return `<span class="bill-days fresh">${days}d</span>`;
}

function buildUI(party, txns, bills, openingDr, closingBal){
  const net = closingBal;
  const netAmt = fmt(Math.abs(net));
  const netSide = net > 0 ? 'Dr' : 'Cr';
  const netClass = net > 0 ? 'dr' : 'cr';
  const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});

  // Outstanding bills only
  const outstandingBills = (bills || []).filter(b => parseFloat(b.bill_amount || 0) > 0);

  let txnRows = '';
  if(openingDr !== 0){
    txnRows += `<div class="txn-row opening">
      <div class="txn-left">
        <div class="txn-type opening">Opening Balance</div>
        <div class="txn-acc">Brought forward</div>
      </div>
      <div class="txn-right">
        <div class="txn-amt ${openingDr>0?'dr':'cr'}">${fmt(openingDr)}</div>
        <div class="txn-bal">${openingDr>0?'Dr':'Cr'}</div>
      </div>
    </div>`;
  }

  let balance = openingDr;
  (txns || []).forEach(t => {
    const dr = t.dr || 0;
    const cr = t.cr || 0;
    if(dr > 0) balance += dr;
    else balance -= cr;
    const typeClass = t.type?.toLowerCase().includes('sales') ? 'sales' :
                      t.type?.toLowerCase().includes('receipt') ? 'receipt' :
                      t.type?.toLowerCase().includes('purchase') ? 'purchase' : '';
    txnRows += `<div class="txn-row">
      <div class="txn-left">
        <div class="txn-date">${t.date || ''}</div>
        <div class="txn-type ${typeClass}">${t.type || ''} ${t.vch_num ? '#'+t.vch_num : ''}</div>
        ${t.account ? `<div class="txn-acc">${t.account}</div>` : ''}
      </div>
      <div class="txn-right">
        <div class="txn-amt ${dr>0?'dr':'cr'}">${dr>0?fmt(dr):fmt(cr)}</div>
        <div class="txn-bal">${fmt(Math.abs(balance))} ${balance>0?'Dr':'Cr'}</div>
      </div>
    </div>`;
  });

  // Closing row
  txnRows += `<div class="txn-row closing">
    <div class="txn-left">
      <div class="txn-type">Closing Balance</div>
    </div>
    <div class="txn-right">
      <div class="txn-amt ${netClass}">${netAmt}</div>
      <div class="txn-bal">${netSide}</div>
    </div>
  </div>`;

  let billRows = '';
  if(outstandingBills.length === 0){
    billRows = '<div class="empty">No outstanding bills</div>';
  } else {
    outstandingBills.forEach(b => {
      const days = ageDays(b.bill_date);
      billRows += `<div class="bill-row">
        <div class="bill-left">
          <div class="bill-ref">${b.bill_ref || 'Bill'}</div>
          <div class="bill-date">${b.bill_date || ''}</div>
        </div>
        <div class="bill-right">
          <div class="bill-amt">${fmt(b.bill_amount)}</div>
          ${daysBadge(days)}
        </div>
        <div class="bill-arrow">›</div>
      </div>`;
    });
  }

  const waMsg = encodeURIComponent(`Hello ${party.party_name}, your account with Electric Emporium shows an outstanding of ${netAmt} ${netSide}. Please contact us at +91 94258 31035.`);

  document.getElementById('content').innerHTML = `
    <div class="party-card">
      <div class="party-name">${party.party_name}</div>
      <div class="party-date">Statement as of ${today}</div>
      <div class="balance-label">Net outstanding</div>
      <div class="balance-row">
        <div class="balance-amt ${netClass}">${netAmt}</div>
        <div class="balance-side ${netClass}">${netSide}</div>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" onclick="downloadPDF()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
        <a class="btn btn-wa" href="https://wa.me/919425831035?text=${waMsg}" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.556 4.112 1.528 5.834L.057 23.267a.5.5 0 0 0 .625.632l5.532-1.451A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.95 9.95 0 0 1-5.076-1.388l-.361-.214-3.745.982.999-3.648-.235-.374A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          WhatsApp
        </a>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('txns',this)">Transactions</button>
      <button class="tab" onclick="showTab('bills',this)">Outstanding bills</button>
    </div>

    <div id="tab-txns" class="section">
      <div class="txn-card">${txnRows}</div>
    </div>

    <div id="tab-bills" class="section" style="display:none">
      <div class="bills-card">${billRows}</div>
    </div>
  `;
}

function showTab(name, el){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-txns').style.display = name === 'txns' ? 'block' : 'none';
  document.getElementById('tab-bills').style.display = name === 'bills' ? 'block' : 'none';
}

async function downloadPDF(){
  alert('PDF download coming soon!');
}

async function init(){
  const token = getToken();
  if(!token){
    showError('Invalid link', 'This link is invalid or has expired. Please contact Electric Emporium for a new link.');
    return;
  }

  try {
    // Single RPC call — table access is locked down server-side (RLS),
    // this SECURITY DEFINER function is the only anon-reachable door and
    // returns data scoped to this token's ledger only.
    const resp = await sbRpc('get_portal_data', { p_token: token });

    if(!resp || resp.error){
      showError('Link expired', 'This link has expired or is invalid. Please contact Electric Emporium for a new link.');
      return;
    }

    const partyName = resp.ledger_name;
    console.log('Party name:', partyName);

    const obRow = resp.opening_balance;
    const openingDr = obRow ? (parseFloat(obRow.opening_dr||0) - parseFloat(obRow.opening_cr||0)) : 0;

    const bills = Array.isArray(resp.bills) ? resp.bills : [];
    const receivable = resp.receivable;

    const party = { party_name: partyName };
    const closingBal = receivable ? parseFloat(receivable.amount || 0) : openingDr;

    // Transactions will come from TDL later — for now show bills as transactions
    const txns = (bills || []).map(b => ({
      date: b.bill_date,
      type: 'Sales',
      vch_num: b.bill_ref,
      dr: parseFloat(b.bill_amount || 0),
      cr: 0,
      account: 'SALE A/C'
    }));

    console.log('Data loaded:', { openingDr, closingBal, billsCount: bills.length, txnsCount: txns.length });
    buildUI(party, txns, bills, openingDr, closingBal);

  } catch(e) {
    showError('Something went wrong', 'Please try again or contact Electric Emporium at +91 94258 31035.');
    console.error(e);
  }
}

init();
</script>
</body>
</html>
